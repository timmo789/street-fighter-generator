<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#11131a" />
    <title>街斗生成器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="横版 2D 格斗小游戏">
      <canvas id="game" aria-label="街斗生成器游戏画面"></canvas>

      <section class="hud" aria-live="polite">
        <div class="fighter-hud fighter-hud--left">
          <div class="fighter-meta">
            <strong id="playerName">Player</strong>
            <span id="playerTag">P1</span>
          </div>
          <div class="meter meter--health"><span id="playerHp"></span></div>
          <div class="meter meter--energy"><span id="playerEnergy"></span></div>
        </div>

        <div class="round-box">
          <strong id="roundLabel">ROUND 1</strong>
          <span id="timer">99</span>
        </div>

        <div class="fighter-hud fighter-hud--right">
          <div class="fighter-meta">
            <span id="enemyTag">CPU</span>
            <strong id="enemyName">Enemy</strong>
          </div>
          <div class="meter meter--health"><span id="enemyHp"></span></div>
          <div class="meter meter--energy"><span id="enemyEnergy"></span></div>
        </div>
      </section>

      <nav class="top-actions" aria-label="游戏菜单">
        <button id="rerollTop" type="button">换人</button>
        <button id="pauseBtn" type="button">暂停</button>
      </nav>

      <section class="touch-controls" aria-label="触控操作">
        <div class="move-pad" aria-label="移动与防御">
          <button class="control-button control-button--wide" data-hold="left" type="button" aria-label="向左移动">←</button>
          <button class="control-button control-button--wide" data-hold="right" type="button" aria-label="向右移动">→</button>
          <button class="control-button" data-hold="block" type="button" aria-label="防御">防</button>
        </div>
        <div class="attack-pad" aria-label="攻击">
          <button class="action-button action-button--punch" data-tap="punch" type="button" aria-label="拳">拳</button>
          <button class="action-button action-button--kick" data-tap="kick" type="button" aria-label="腿">腿</button>
          <button class="action-button action-button--special" data-tap="special" type="button" aria-label="必杀技">技</button>
        </div>
      </section>

      <section id="overlay" class="overlay">
        <div class="overlay-panel">
          <p class="eyebrow">AUTO SPRITE FIGHT</p>
          <h1 id="overlayTitle">街斗生成器</h1>
          <p id="overlayText">每局自动生成两名格斗角色。</p>
          <div class="overlay-actions">
            <button id="startBtn" class="primary-button" type="button">开战</button>
            <button id="rerollBtn" type="button">换人物</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
